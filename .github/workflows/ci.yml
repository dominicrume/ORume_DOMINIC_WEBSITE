name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://rumedominic.com
          NEXT_PUBLIC_BOOKING_URL: https://calendar.zoho.com/zc/view/slot-booking/zz08011220606d8cd42bc2b098fd534d89069a225fee8a0cc377b2a89fa8c729eb19bbef77::
